name: JudgyMac
options:
  bundleIdPrefix: com.judgymac
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  minimumXcodeGenVersion: "2.40"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.judgymac.app
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_HARDENED_RUNTIME: true

targets:
  JudgyMac:
    type: application
    platform: macOS
    sources:
      - path: JudgyMac
        excludes:
          - "Resources/**"
      - path: JudgyMac/Resources/CharacterPacks
        type: folder
        buildPhase: resources
      - path: JudgyMac/Resources/Emoji
        type: folder
        buildPhase: resources
      - path: JudgyMac/Resources/Sounds
        type: folder
        buildPhase: resources
    info:
      path: JudgyMac/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: JudgyMac
        NSHumanReadableCopyright: "Copyright © 2026 JudgyMac. All rights reserved."
    settings:
      base:
        PRODUCT_NAME: JudgyMac
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) ACCELEROMETER_ENABLED"
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
    entitlements:
      path: JudgyMac/JudgyMac.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true

  JudgyMacPro:
    type: application
    platform: macOS
    sources:
      - path: JudgyMac
        excludes:
          - "Resources/**"
      - path: JudgyMac/Resources/CharacterPacks
        type: folder
        buildPhase: resources
      - path: JudgyMac/Resources/Emoji
        type: folder
        buildPhase: resources
      - path: JudgyMac/Resources/Sounds
        type: folder
        buildPhase: resources
    info:
      path: JudgyMac/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: JudgyMac Pro
        NSHumanReadableCopyright: "Copyright © 2026 JudgyMac. All rights reserved."
    settings:
      base:
        PRODUCT_NAME: JudgyMac Pro
        PRODUCT_BUNDLE_IDENTIFIER: com.judgymac.pro
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: ACCELEROMETER_ENABLED
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
    entitlements:
      path: JudgyMac/JudgyMacPro.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
